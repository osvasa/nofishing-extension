<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Successful — NøFishing AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #ffffff;
  color: #111111;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  width: 100%;
  height: 56px;
  background: #111111;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-text {
  font-size: 16px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: 0.06em;
}

/* ── Content ── */
.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 48px 24px;
  text-align: center;
}

.success-fish {
  width: 120px;
  height: auto;
  display: block;
  margin: 0 auto 28px;
}

.success-title {
  font-size: 28px;
  font-weight: 900;
  color: #111111;
  margin-bottom: 12px;
}

.success-desc {
  font-size: 15px;
  color: #888888;
  line-height: 1.7;
  max-width: 380px;
  margin: 0 auto 36px;
}

.btn-start {
  display: inline-block;
  width: 100%;
  max-width: 320px;
  padding: 16px 24px;
  background: #EC220C;
  color: #ffffff;
  border: none;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}

.btn-start:hover { opacity: 0.9; }
.btn-start:active { transform: scale(0.98); }

.activating {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 28px;
}

.spinner {
  width: 24px;
  height: 24px;
  border: 3px solid #eeeeee;
  border-top-color: #EC220C;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.activating-text {
  font-size: 14px;
  font-weight: 600;
  color: #999999;
}

.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <span class="header-text">N&Oslash;FISHING AI</span>
</div>

<div class="container">
  <!-- Activating spinner (shown briefly) -->
  <div id="activating" class="activating">
    <div class="spinner"></div>
    <span class="activating-text">Activating protection...</span>
  </div>

  <!-- Success content (shown after activation) -->
  <div id="success-content" class="hidden">
    <img src="icons/fish-no-symbol-red.png" alt="NøFishing AI" class="success-fish"/>
    <div class="success-title">You are now fully protected!</div>
    <p class="success-desc">You don't need to do anything else. Every time we detect a phishing page we will warn you and block it.</p>
    <button class="btn-start" id="btn-start">Start Browsing Safely</button>
  </div>
</div>

<script>
  // Activate protection in storage
  chrome.storage.local.set({ activated: true, activatedAt: Date.now() }, () => {
    // Tell background.js to start protection
    chrome.runtime.sendMessage({ action: 'activate' }, () => {
      // Hide spinner, show success
      document.getElementById('activating').classList.add('hidden');
      document.getElementById('success-content').classList.remove('hidden');
    });
  });

  // "Start Browsing Safely" closes this tab
  document.getElementById('btn-start').addEventListener('click', () => {
    window.close();
  });
</script>

</body>
</html>
